<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Faye Zhou | Home</title>
  <meta
    name="description"
    content="Interactive portfolio homepage for Faye Zhou featuring hanging text, responsive rope motion, and a minimal three-page structure."
  >
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23111111'/%3E%3Cpath d='M14 22h36v5H14zm0 16h25v5H14z' fill='%23ffffff'/%3E%3C/svg%3E"
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Shantell+Sans:ital,wght@0,400;0,500;0,600;1,500&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="/assets/css/site.css">
</head>
<body class="page-home">
  <header class="site-header">
    <nav class="site-nav" aria-label="Primary">
      <a class="nav-link is-active" href="/">Home</a>
      <a class="nav-link" href="/works/">Works</a>
      <a class="nav-link" href="/about/">About</a>
    </nav>
  </header>

  <main class="home-stage">
    <h1 class="sr-only">Hi i am Faye Zhou</h1>
    <div class="home-intro" aria-hidden="true">
      <p class="home-kicker">Hi i am Faye Zhou</p>
      <p class="home-note">Move the mouse to pull the letters. The words settle back like hanging notes.</p>
    </div>
    <canvas id="home-canvas"></canvas>
  </main>

  <footer class="site-footer">
    <p>© Faye Zhou</p>
  </footer>

  <script src="/assets/js/site.js"></script>
  <script src="/assets/js/home-canvas.js"></script>

</html>
